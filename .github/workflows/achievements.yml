name: Update Achievements

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

permissions:
  contents: write

jobs:
  achievements:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate achievements
        uses: ./.github/actions/achievements
        with:
          token: ${{ secrets.GH_TOKEN }}
          display: compact
          threshold: X

      - name: Add and commit
        uses: EndBug/add-and-commit@v9
        with:
          add: README.md assets/achievements
          message: Update achievements
          default_author: github_actions
