name: Update Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

permissions:
  contents: write

jobs:
  github-readme-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate README stats images
        run: |
          curl "https://github-readme-stats-hui5.vercel.app/api?username=ptrvsrg&show_icons=true&hide_border=true&count_private=true&include_all_commits=true&theme=dark&bg_color=0d1117" > assets/metrics-general.svg
          curl "https://github-readme-stats-hui5.vercel.app/api/top-langs/?username=ptrvsrg&show_icons=true&hide_border=true&theme=dark&bg_color=0d1117&size_weight=0.3&count_weight=0.7&langs_count=10&layout=compact" > assets/metrics-languages.svg

      - name: Add and commit
        uses: EndBug/add-and-commit@v9
        with:
          add: ./*.svg
          message: Update github-readme-stats
          default_author: github_actions

  achievements:
    runs-on: ubuntu-latest
    steps:
      - name: Generate achievements
        uses: gh-metrics/metrics@master
        with:
          filename: assets/metrics-achievements.svg
          token: ${{ secrets.GH_TOKEN }}
          user: ptrvsrg
          base: ""
          config_timezone: Asia/Novosibirsk
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: X

  recent-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout metrics activity plugin
        uses: actions/checkout@v4
        with:
          repository: gh-metrics/metrics
          ref: master
          path: .github/actions/metrics-activity

      - name: Patch metrics activity plugin
        run: |
          git -C .github/actions/metrics-activity apply "$GITHUB_WORKSPACE/.github/patches/metrics-activity.patch"
          node --check .github/actions/metrics-activity/source/plugins/activity/index.mjs

      - name: Generate recent activity
        uses: ./.github/actions/metrics-activity
        with:
          filename: assets/metrics-activity.svg
          token: ${{ secrets.GH_TOKEN }}
          user: ptrvsrg
          base: ""
          config_timezone: Asia/Novosibirsk
          plugin_activity: yes
          plugin_activity_limit: 10
          plugin_activity_days: 0
          plugin_activity_filter: comment, release, push, issue, pr, review, wiki, fork, star, member, public
