name: Update Credly Badges

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  credly-badges:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Credly badges
        uses: ./.github/actions/credly
        with:
          username: ptrvsrg

      - name: Add and commit
        uses: EndBug/add-and-commit@v9
        with:
          add: README.md assets/badges
          message: Update Credly badges
          default_author: github_actions
