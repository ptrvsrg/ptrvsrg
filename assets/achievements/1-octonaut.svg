<svg xmlns="http://www.w3.org/2000/svg" width="88" height="96" viewBox="0 0 88 96" role="img" aria-label="Octonaut">
  <style>svg{
        font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;
        color:#777
    }
    .gauge{
        stroke-linecap:round;
        fill:none
    }
    .gauge-base,.gauge-arc{
        stroke:currentColor;
        stroke-width:6
    }
    .gauge-base{
        stroke-opacity:.2
    }
    .achievement{
        display:flex;
        margin:4px 0
    }
    .achievement .icon{
        margin:0 4px;
        width:44px;
        height:44px
    }
    .achievement .text{
        font-size:12px;
        color:#666
    }
    .achievement .title{
        font-size:14px;
        color:#58A6FF
    }
    .achievement .gauge.info{
        color:#58A6FF
    }
    .achievement .value{
        background-color:#58A6FF26
    }
    .achievement.x .title{
        color:#666
    }
    .achievement.x .gauge.info{
        color:#B0B0B0
    }
    .achievement.x .value{
        background-color:#B0B0B026
    }
    .achievement.b .title{
        color:#9D8FFF
    }
    .achievement.b .gauge.info{
        color:#9E91FF
    }
    .achievement.b .value{
        background-color:#9E91FF26
    }
    .achievement.a .title{
        color:#D79533
    }
    .achievement.a .gauge.info{
        color:#E7BD69
    }
    .achievement.a .value{
        background-color:#E7BD6926
    }
    .achievement.s .title{
        color:#EB355E
    }
    .achievement.s .gauge.info{
        color:#EB355E
    }
    .achievement.s .value{
        background-color:#EB355E26
    }
    .achievement.secret .title{
        color:#FF76CD
    }
    .achievement.secret .gauge.info{
        color:#FF79D1
    }
    .achievement.secret .value{
        background-color:#FF79D126
    }
    .achievement .gh,.achievement .value{
        border:1px solid currentColor;
        border-radius:16px;
        font-size:10px;
        padding:0 5px;
        white-space:nowrap
    }
    .achievement .value-wrapper{
        margin-bottom:-50px;
        margin-top:36px;
        display:none
    }
    .achievement .value{
        margin-left:46px
    }
    .achievements.compact{
        display:flex;
        flex-wrap:wrap
    }
    .achievements.compact .achievement{
        flex-direction:column-reverse;
        align-items:center;
        width:80px
    }
    .achievements.compact .info{
        width:100%
    }
    .achievements.compact .achievement .title{
        margin-bottom:2px;
        text-transform:capitalize;
        text-align:center
    }
    .achievements.compact .achievement .title .prefix{
        min-height:13px;
        font-size:10px;
        display:block;
        margin-bottom:-.25rem
    }
    .achievements.compact .achievement .value-wrapper{
        display:flex
    }
    .achievements.compact .achievement .text,.achievements.compact .achievement .gh{
        display:none
    }
</style>
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <section class="achievements compact">
    <div class="achievement secret">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" height="44" width="44">
          <defs>
            <mask id="mask">
              <circle class="gauge-base" r="25" cx="28" cy="28" fill="white"></circle>
            </mask>
          </defs>
          <svg xmlns="http://www.w3.org/2000/svg" class="gauge info">
            <circle class="gauge-base" r="25" cx="28" cy="28"></circle>
            <circle class="gauge-arc" transform="rotate(-90 28 28)" r="25" cx="28" cy="28" stroke-dasharray="155 155"></circle>
          </svg>
          <svg xmlns="http://www.w3.org/2000/svg" mask="url(#mask)"><g fill="none" fill-rule="evenodd"><path d="M14.7 8c.316 1.122.572 1.372 1.71 1.678-1.136.314-1.39.566-1.7 1.69-.317-1.121-.573-1.372-1.71-1.679 1.135-.313 1.389-.566 1.7-1.689zm26 0c.316 1.122.572 1.372 1.71 1.678-1.136.314-1.39.566-1.7 1.69-.317-1.121-.573-1.372-1.71-1.679 1.135-.313 1.389-.566 1.7-1.689zM28.021 5c.318 1.122.574 1.372 1.711 1.678-1.136.314-1.389.566-1.7 1.69-.317-1.121-.572-1.372-1.71-1.679 1.135-.313 1.39-.566 1.7-1.689z" stroke="#FF48BD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><g transform="translate(4 9)" fill-rule="nonzero"><path d="M14.05 9.195C10.327 7.065 7.46 6 5.453 6 4.92 6 4 6.164 3.5 6.653s-.572.741-.711 1.14c-.734 2.1-1.562 6.317.078 9.286-8.767 25.38 15.513 24.92 21.207 24.92 5.695 0 29.746.456 21.037-24.908 1.112-2.2 1.404-5.119.121-9.284-.863-2.802-4.646-2.341-11.35 1.384a27.38 27.38 0 00-9.802-1.81c-3.358 0-6.701.605-10.03 1.814z" stroke="#FF92D8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10.323 40.074c-2.442-1.02-2.93-3.308-2.93-4.834 0-1.527.488-2.45.976-3.92.489-1.47.391-2.281-.976-5.711-1.368-3.43.976-7.535 4.884-7.535 3.908 0 7.088 3.005 11.723 2.956m0 0c4.635.05 7.815-2.956 11.723-2.956 3.908 0 6.252 4.105 4.884 7.535-1.367 3.43-1.465 4.241-.976 5.71.488 1.47.976 2.394.976 3.92 0 1.527-.488 3.816-2.93 4.835" stroke="#FF92D8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle fill="#FF48BD" cx="12" cy="30" r="1"/><circle fill="#FF48BD" cx="13" cy="28" r="1"/><circle fill="#FF48BD" cx="15" cy="28" r="1"/><circle fill="#FF48BD" cx="23" cy="35" r="1"/><circle fill="#FF48BD" cx="25" cy="35" r="1"/><circle fill="#FF48BD" cx="17" cy="28" r="1"/><circle fill="#FF48BD" cx="31" cy="28" r="1"/><circle fill="#FF48BD" cx="33" cy="28" r="1"/><circle fill="#FF48BD" cx="35" cy="28" r="1"/><circle fill="#FF48BD" cx="12" cy="32" r="1"/><circle fill="#FF48BD" cx="19" cy="30" r="1"/><circle fill="#FF48BD" cx="19" cy="32" r="1"/><circle fill="#FF48BD" cx="29" cy="30" r="1"/><circle fill="#FF48BD" cx="29" cy="32" r="1"/><circle fill="#FF48BD" cx="36" cy="30" r="1"/><circle fill="#FF48BD" cx="36" cy="32" r="1"/></g></g></svg>
        </svg>
      </div>
      <div class="info">
        <div class="title">
          <span class="prefix"></span> Octonaut
          <div class="value-wrapper">
            <div class="value">☆</div>
          </div>
        </div>
        <div class="text">Following octocat</div>
      </div>
    </div>
  </section>
    </div>
  </foreignObject>
</svg>
