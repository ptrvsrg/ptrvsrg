<svg xmlns="http://www.w3.org/2000/svg" width="88" height="96" viewBox="0 0 88 96" role="img" aria-label="Worker">
  <style>svg{
        font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;
        color:#777
    }
    .gauge{
        stroke-linecap:round;
        fill:none
    }
    .gauge-base,.gauge-arc{
        stroke:currentColor;
        stroke-width:6
    }
    .gauge-base{
        stroke-opacity:.2
    }
    .achievement{
        display:flex;
        margin:4px 0
    }
    .achievement .icon{
        margin:0 4px;
        width:44px;
        height:44px
    }
    .achievement .text{
        font-size:12px;
        color:#666
    }
    .achievement .title{
        font-size:14px;
        color:#58A6FF
    }
    .achievement .gauge.info{
        color:#58A6FF
    }
    .achievement .value{
        background-color:#58A6FF26
    }
    .achievement.x .title{
        color:#666
    }
    .achievement.x .gauge.info{
        color:#B0B0B0
    }
    .achievement.x .value{
        background-color:#B0B0B026
    }
    .achievement.b .title{
        color:#9D8FFF
    }
    .achievement.b .gauge.info{
        color:#9E91FF
    }
    .achievement.b .value{
        background-color:#9E91FF26
    }
    .achievement.a .title{
        color:#D79533
    }
    .achievement.a .gauge.info{
        color:#E7BD69
    }
    .achievement.a .value{
        background-color:#E7BD6926
    }
    .achievement.s .title{
        color:#EB355E
    }
    .achievement.s .gauge.info{
        color:#EB355E
    }
    .achievement.s .value{
        background-color:#EB355E26
    }
    .achievement.secret .title{
        color:#FF76CD
    }
    .achievement.secret .gauge.info{
        color:#FF79D1
    }
    .achievement.secret .value{
        background-color:#FF79D126
    }
    .achievement .gh,.achievement .value{
        border:1px solid currentColor;
        border-radius:16px;
        font-size:10px;
        padding:0 5px;
        white-space:nowrap
    }
    .achievement .value-wrapper{
        margin-bottom:-50px;
        margin-top:36px;
        display:none
    }
    .achievement .value{
        margin-left:46px
    }
    .achievements.compact{
        display:flex;
        flex-wrap:wrap
    }
    .achievements.compact .achievement{
        flex-direction:column-reverse;
        align-items:center;
        width:80px
    }
    .achievements.compact .info{
        width:100%
    }
    .achievements.compact .achievement .title{
        margin-bottom:2px;
        text-transform:capitalize;
        text-align:center
    }
    .achievements.compact .achievement .title .prefix{
        min-height:13px;
        font-size:10px;
        display:block;
        margin-bottom:-.25rem
    }
    .achievements.compact .achievement .value-wrapper{
        display:flex
    }
    .achievements.compact .achievement .text,.achievements.compact .achievement .gh{
        display:none
    }
</style>
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <section class="achievements compact">
    <div class="achievement b">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" height="44" width="44">
          <defs>
            <mask id="mask">
              <circle class="gauge-base" r="25" cx="28" cy="28" fill="white"></circle>
            </mask>
          </defs>
          <svg xmlns="http://www.w3.org/2000/svg" class="gauge info">
            <circle class="gauge-base" r="25" cx="28" cy="28"></circle>
            <circle class="gauge-arc" transform="rotate(-90 28 28)" r="25" cx="28" cy="28" stroke-dasharray="0 155"></circle>
          </svg>
          <svg xmlns="http://www.w3.org/2000/svg" mask="url(#mask)"><g stroke-linecap="round" stroke-width="2" fill="none" fill-rule="evenodd"><g stroke="#B2A8FF" stroke-linejoin="round"><path d="M30 51H16.543v-2.998h-4v2.976l-5.537.016a2 2 0 01-2.006-2v-8.032a2 2 0 01.75-1.562l9.261-7.406 5.984 5.143m29.992 3.864v10h-6v-3h-5v3h-6m-.987-33c.133-1.116.793-2.106 1.978-2.968.44-.32 5.776-3.664 16.01-10.032v36"/><path d="M19 34.994v-8.982m16 0V49a2 2 0 01-2 2h-8.987l.011-6.957"/></g><path stroke="#B2A8FF" d="M40 38h5M40 34h5"/><path stroke="#7D6CFF" d="M25 30h5M25 34h5M25 26h5"/><path d="M35.012 22.003H9.855a4.843 4.843 0 010-9.686h1.479c1.473-4.268 4.277-6.674 8.41-7.219 6.493-.856 9.767 4.27 10.396 5.9.734-.83 2.137-2.208 4.194-1.964a4.394 4.394 0 011.685.533" stroke="#7D6CFF" stroke-linejoin="round"/></g></svg>
        </svg>
      </div>
      <div class="info">
        <div class="title">
          <span class="prefix">Great</span> worker
          <div class="value-wrapper">
            <div class="value">2</div>
          </div>
        </div>
        <div class="text">Joined 2 organizations</div>
      </div>
    </div>
  </section>
    </div>
  </foreignObject>
</svg>
