 000 6zM35.194 35.33l10.812 11.019" stroke="#B0B0B0" stroke-width="2"/></g></svg>
        </svg>
      </div>
      <div class="info">
        <div class="title">
          <span class="prefix"></span> Sponsor
          <div class="value-wrapper">
            <div class="value">0</div>
          </div>
        </div>
        <div class="text">Sponsoring 0 users or organizations</div>
      </div>
    </div>
  </section>
    </div>
