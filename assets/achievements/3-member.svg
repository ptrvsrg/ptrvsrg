<svg xmlns="http://www.w3.org/2000/svg" width="88" height="96" viewBox="0 0 88 96" role="img" aria-label="Member">
  <style>svg{
        font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;
        color:#777
    }
    .gauge{
        stroke-linecap:round;
        fill:none
    }
    .gauge-base,.gauge-arc{
        stroke:currentColor;
        stroke-width:6
    }
    .gauge-base{
        stroke-opacity:.2
    }
    .achievement{
        display:flex;
        margin:4px 0
    }
    .achievement .icon{
        margin:0 4px;
        width:44px;
        height:44px
    }
    .achievement .text{
        font-size:12px;
        color:#666
    }
    .achievement .title{
        font-size:14px;
        color:#58A6FF
    }
    .achievement .gauge.info{
        color:#58A6FF
    }
    .achievement .value{
        background-color:#58A6FF26
    }
    .achievement.x .title{
        color:#666
    }
    .achievement.x .gauge.info{
        color:#B0B0B0
    }
    .achievement.x .value{
        background-color:#B0B0B026
    }
    .achievement.b .title{
        color:#9D8FFF
    }
    .achievement.b .gauge.info{
        color:#9E91FF
    }
    .achievement.b .value{
        background-color:#9E91FF26
    }
    .achievement.a .title{
        color:#D79533
    }
    .achievement.a .gauge.info{
        color:#E7BD69
    }
    .achievement.a .value{
        background-color:#E7BD6926
    }
    .achievement.s .title{
        color:#EB355E
    }
    .achievement.s .gauge.info{
        color:#EB355E
    }
    .achievement.s .value{
        background-color:#EB355E26
    }
    .achievement.secret .title{
        color:#FF76CD
    }
    .achievement.secret .gauge.info{
        color:#FF79D1
    }
    .achievement.secret .value{
        background-color:#FF79D126
    }
    .achievement .gh,.achievement .value{
        border:1px solid currentColor;
        border-radius:16px;
        font-size:10px;
        padding:0 5px;
        white-space:nowrap
    }
    .achievement .value-wrapper{
        margin-bottom:-50px;
        margin-top:36px;
        display:none
    }
    .achievement .value{
        margin-left:46px
    }
    .achievements.compact{
        display:flex;
        flex-wrap:wrap
    }
    .achievements.compact .achievement{
        flex-direction:column-reverse;
        align-items:center;
        width:80px
    }
    .achievements.compact .info{
        width:100%
    }
    .achievements.compact .achievement .title{
        margin-bottom:2px;
        text-transform:capitalize;
        text-align:center
    }
    .achievements.compact .achievement .title .prefix{
        min-height:13px;
        font-size:10px;
        display:block;
        margin-bottom:-.25rem
    }
    .achievements.compact .achievement .value-wrapper{
        display:flex
    }
    .achievements.compact .achievement .text,.achievements.compact .achievement .gh{
        display:none
    }
</style>
  <foreignObject width="100%" height="100%">
