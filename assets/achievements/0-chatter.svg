<svg xmlns="http://www.w3.org/2000/svg" width="88" height="96" viewBox="0 0 88 96" role="img" aria-label="Chatter">
  <style>svg{
        font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;
        color:#777
    }
    .gauge{
        stroke-linecap:round;
        fill:none
    }
    .gauge-base,.gauge-arc{
        stroke:currentColor;
        stroke-width:6
    }
    .gauge-base{
        stroke-opacity:.2
    }
    .achievement{
        display:flex;
        margin:4px 0
    }
    .achievement .icon{
        margin:0 4px;
        width:44px;
        height:44px
    }
    .achievement .text{
        font-size:12px;
        color:#666
    }
    .achievement .title{
        font-size:14px;
        color:#58A6FF
    }
    .achievement .gauge.info{
        color:#58A6FF
    }
    .achievement .value{
        background-color:#58A6FF26
    }
    .achievement.x .title{
        color:#666
    }
    .achievement.x .gauge.info{
        color:#B0B0B0
    }
    .achievement.x .value{
        background-color:#B0B0B026
    }
    .achievement.b .title{
        color:#9D8FFF
    }
    .achievement.b .gauge.info{
        color:#9E91FF
    }
    .achievement.b .value{
        background-color:#9E91FF26
    }
    .achievement.a .title{
        color:#D79533
    }
    .achievement.a .gauge.info{
        color:#E7BD69
    }
    .achievement.a .value{
        background-color:#E7BD6926
    }
    .achievement.s .title{
        color:#EB355E
    }
    .achievement.s .gauge.info{
        color:#EB355E
    }
    .achievement.s .value{
        background-color:#EB355E26
    }
    .achievement.secret .title{
        color:#FF76CD
    }
    .achievement.secret .gauge.info{
        color:#FF79D1
    }
    .achievement.secret .value{
        background-color:#FF79D126
    }
    .achievement .gh,.achievement .value{
        border:1px solid currentColor;
        border-radius:16px;
        font-size:10px;
        padding:0 5px;
        white-space:nowrap
    }
    .achievement .value-wrapper{
        margin-bottom:-50px;
        margin-top:36px;
        display:none
    }
    .achievement .value{
        margin-left:46px
    }
    .achievements.compact{
        display:flex;
        flex-wrap:wrap
    }
    .achievements.compact .achievement{
        flex-direction:column-reverse;
        align-items:center;
        width:80px
    }
    .achievements.compact .info{
        width:100%
    }
    .achievements.compact .achievement .title{
        margin-bottom:2px;
        text-transform:capitalize;
        text-align:center
    }
    .achievements.compact .achievement .title .prefix{
        min-height:13px;
        font-size:10px;
        display:block;
        margin-bottom:-.25rem
    }
    .achievements.compact .achievement .value-wrapper{
        display:flex
    }
    .achievements.compact .achievement .text,.achievements.compact .achievement .gh{
        display:none
    }
</style>
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <section class="achievements compact">
    <div class="achievement x">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" height="44" width="44">
          <defs>
            <mask id="mask">
              <circle class="gauge-base" r="25" cx="28" cy="28" fill="white"></circle>
            </mask>
          </defs>
          <svg xmlns="http://www.w3.org/2000/svg" class="gauge info">
            <circle class="gauge-base" r="25" cx="28" cy="28"></circle>
            <circle class="gauge-arc" transform="rotate(-90 28 28)" r="25" cx="28" cy="28" stroke-dasharray="0 155"></circle>
          </svg>
          <svg xmlns="http://www.w3.org/2000/svg" mask="url(#mask)"><g fill="none" fill-rule="evenodd"><path d="M6 42c.45-3.415 3.34-6 7-6 1.874 0 3.752.956 5 3m-6-13a5 5 0 110 10 5 5 0 010-10zm38 16c-.452-3.415-3.34-6-7-6-1.874 0-3.752.956-5 3m6-13a5 5 0 100 10 5 5 0 000-10z" stroke="#B0B0B0" stroke-width="2" stroke-linecap="round"/><path d="M37 51c-.92-4.01-4.6-7-9-7-4.401 0-8.083 2.995-9 7" stroke="#7A7A7A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M28.01 31.004a6.5 6.5 0 110 13 6.5 6.5 0 010-13z" stroke="#7A7A7A" stroke-width="2" stroke-linecap="round"/><path d="M28 14.011a5 5 0 11-5 4.998 5 5 0 015-4.998z" stroke="#B0B0B0" stroke-width="2" stroke-linecap="round"/><path d="M22 26c1.558-1.25 3.665-2 6-2 2.319 0 4.439.761 6 2" stroke="#B0B0B0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M51 9V8c0-1.3-1.574-3-3-3h-8c-1.426 0-3 1.7-3 3v13l4-4h6c2.805-.031 4-1.826 4-4V9zM5 9V8c0-1.3 1.574-3 3-3h8c1.426 0 3 1.7 3 3v13l-4-4H9c-2.805-.031-4-1.826-4-4V9z" stroke="#7A7A7A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M43 11a1 1 0 11-2 0 1 1 0 012 0zm4 0a1 1 0 11-2 0 1 1 0 012 0zm-36 0a1 1 0 11-2 0 1 1 0 012 0zm4 0a1 1 0 11-2 0 1 1 0 012 0z" fill="#7A7A7A"/></g></svg>
        </svg>
      </div>
      <div class="info">
        <div class="title">
          <span class="prefix"></span> Chatter
          <div class="value-wrapper">
            <div class="value">0</div>
          </div>
        </div>
        <div class="text">Participated in discussions 0 times</div>
      </div>
    </div>
  </section>
    </div>
  </foreignObject>
</svg>
